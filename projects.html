<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio | Sheila Marie De Guzman</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans">

  <!-- Header -->
  <header class="bg-gray-800 p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold">Sheila Marie De Guzman</h1>
      <nav class="space-x-4 text-sm">
        <a href="index.html" class="hover:underline">Home</a>
        <a href="about.html" class="hover:underline">About</a>
        <a href="work.html" class="hover:underline">Experience</a>
        <a href="skills.html" class="hover:underline">Skills</a>
        <a href="projects.html" class="underline font-semibold">Portfolio</a>
        <a href="contact.html" class="hover:underline">Hire Me</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="py-20 px-6 max-w-4xl mx-auto">

    <h2 class="text-4xl font-bold mb-10 text-center">📚 Projects & Portfolio</h2>

    <!-- Card -->
    <div id="project-card"
         class="bg-gray-800 rounded-2xl p-8 text-center shadow-lg transition duration-300">

    </div>

    <!-- Buttons -->
    <div class="flex justify-center gap-4 mt-6">
      <button onclick="prevProject()"
              class="px-4 py-2 bg-indigo-600 hover:bg-pink-500 rounded-lg transition">
        ⬅️ Previous
      </button>

      <button onclick="nextProject()"
              class="px-4 py-2 bg-indigo-600 hover:bg-pink-500 rounded-lg transition">
        Next ➡️
      </button>
    </div>

  </main>

  <!-- Footer -->
  <footer class="text-center text-gray-500 text-sm py-6">
    © 2025 Sheila Marie De Guzman / Hazure Vale
  </footer>

  <script>
    const projects = [
      {
        title: "My Canva Portfolio",
        description: "A visual showcase of my work, designs, and creative projects.",
       link: "https://canva.link/7r0vzrz2s6ax3y4"
      },
      {
        title: "Room Zer0",
        description: "A genre-bending tale of rebellion, found family, and control.",
        link: "https://hazure611.github.io/RoomZer0/"
      },
      {
        title: "Obsidian Code",
        description: "Dark secrets unravel in this gripping novel.",
        link: "https://a.co/d/h8ZySnL"
      },
      {
        title: "Crimson Confession",
        description: "A tale of forbidden truths and passion.",
        link: "https://a.co/d/fzzLVNu"
      }
    ];

    let currentIndex = 0;

    function renderProject(i) {
      const p = projects[i];

      document.getElementById("project-card").innerHTML = `
        <h3 class="text-2xl font-bold mb-3">${p.title}</h3>
        <p class="text-gray-300 mb-6">${p.description}</p>

        <a href="${p.link}" target="_blank"
           class="inline-block px-6 py-3 bg-purple-600 hover:bg-pink-500 rounded-xl transition font-semibold">
          Open Link
        </a>
      `;
    }

    function nextProject() {
      currentIndex = (currentIndex + 1) % projects.length;
      renderProject(currentIndex);
    }

    function prevProject() {
      currentIndex = (currentIndex - 1 + projects.length) % projects.length;
      renderProject(currentIndex);
    }

    renderProject(currentIndex);
  </script>

</body>
</html>
